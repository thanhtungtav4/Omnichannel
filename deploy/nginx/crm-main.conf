# Main app vhost — handles qrf.vn (apex) and all *.qrf.vn subdomains that don't
# have a more specific server block (admin.qrf.vn and webhook.qrf.vn each have
# their own vhost and win by SNI specificity).
#
# Path: /etc/nginx/sites-available/crm-main
# Enable: sudo ln -s /etc/nginx/sites-available/crm-main /etc/nginx/sites-enabled/crm-main
#
# Tenant subdomains ({slug}.qrf.vn) hit this block. ResolveWorkspace middleware
# pins the tenant from the Host header; unknown slugs 404.
#
# Requires:
#   - $LE_ROOT, $LE_CERT_CHAIN, $LE_CERT (Let's Encrypt managed paths)
#     Recommended: use the existing wildcard cert for *.qrf.vn so this block
#     and admin/webhook vhosts share one certificate.
#   - $DH (Diffie-Hellman params; one-time `openssl dhparam -out /etc/nginx/dhparam.pem 2048`)

# Redirect HTTP -> HTTPS for the whole wildcard family.
server {
    listen 80;
    server_name qrf.vn *.qrf.vn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name qrf.vn *.qrf.vn;

    ssl_certificate     $LE_ROOT/fullchain.pem;
    ssl_certificate_key $LE_ROOT/privkey.pem;
    ssl_dhparam         $DH;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/crm/public;
    index index.php;
    charset utf-8;

    # Per-vhost log files — easier than grepping one giant access.log when
    # debugging tenant traffic vs admin traffic vs webhook traffic.
    access_log /var/log/nginx/crm-main.access.log;
    error_log  /var/log/nginx/crm-main.error.log warn;

    # Belt-and-suspenders: refuse non-POST/GET to anything under /api/* and
    # /webhooks/*. Real enforcement is in Laravel (CSRF + middleware), but a
    # 405 from nginx is cheaper than a full request cycle.
    if ($request_method !~ ^(GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS)$) {
        return 405;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Tenant / admin / apex app traffic — Laravel handles routing.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Real client IP behind any CDN/proxy (Cloudflare-compatible).
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_CF_CONNECTING_IP $http_cf_connecting_ip;
        fastcgi_read_timeout 60s;
    }

    location ~ /\.(?!well-known).* { deny all; }

    # 25M is enough for media uploads; bump if you start accepting large files.
    client_max_body_size 25M;

    error_page 404 /index.php;
}