# Provider webhook ingress vhost — webhook.qrf.vn.
#
# Why a dedicated vhost:
#   1. Method-restricted: only POST/GET (Facebook verify). Any other verb is
#      405 before PHP-FPM even sees it.
#   2. Body cap lower than the main app (webhook payloads are small JSON).
#   3. Access policy isolation — webhook traffic spikes won't pollute the main
#      access log and vice versa.
#   4. Independent TLS tuning — HSTS, cipher, OCSP stapling can be tuned for
#      provider clients without touching the operator UI.
#   5. Easy to add a CDN/WAF in front of just this host if abuse ever appears.
#
# Path: /etc/nginx/sites-available/crm-webhook
# Enable: sudo ln -s /etc/nginx/sites-available/crm-webhook /etc/nginx/sites-enabled/crm-webhook
#
# DNS: webhook.qrf.vn -> VPS_IP (covered by the existing *.qrf.vn wildcard cert).
#
# Requires the same $LE_ROOT / $LE_CERT / $DH vars as crm-main.conf.

# Redirect HTTP -> HTTPS for the webhook host only.
server {
    listen 80;
    server_name webhook.qrf.vn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name webhook.qrf.vn;

    ssl_certificate     $LE_ROOT/fullchain.pem;
    ssl_certificate_key $LE_ROOT/privkey.pem;
    ssl_dhparam         $DH;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    root /var/www/crm/public;
    charset utf-8;

    access_log /var/log/nginx/crm-webhook.access.log;
    error_log  /var/log/nginx/crm-webhook.error.log warn;

    # CRITICAL: only POST (and GET for Facebook verify). Reject everything else
    # at the edge so scanners / junk traffic never reach PHP-FPM.
    if ($request_method !~ ^(GET|HEAD|POST)$) {
        return 405;
    }

    # Webhook payloads are small JSON (Telegram update < 64KB, Zalo OA < 32KB,
    # Facebook batch < 100KB). 1MB is a generous ceiling that still keeps the
    # server safe from a runaway provider or attacker.
    client_max_body_size 1m;
    client_body_timeout  10s;
    client_header_timeout 10s;

    # Static files don't exist on this host — but Laravel's favicon.ico and
    # robots.txt are served by the framework. Keep the silencer.
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Health probe (no provider secret required) for uptime monitors.
    # Laravel's /up is wired in bootstrap/app.php -> health: '/up'.
    location = /up {
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    # Provider webhooks go through the same Laravel pipeline; routes/web.php
    # binds them to webhook.{tenant.domain} so they only resolve on this host.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_CF_CONNECTING_IP $http_cf_connecting_ip;
        # Provider calls are short — cap PHP execution so a stuck request
        # doesn't pile up FPM workers.
        fastcgi_read_timeout 15s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Belt-and-suspenders: hide dotfiles.
    location ~ /\.(?!well-known).* { deny all; }

    # Provider traffic gets a fresh 404 if anything outside the Laravel
    # pipeline resolves — the framework's exception handler turns it into
    # the standard 404 JSON.
    error_page 404 /index.php;
}

# Optional: IP allowlist for known provider ranges. Uncomment to lock down.
# Telegram Bot API uses these ranges (as of 2024-09; verify before relying):
#   149.154.160.0/20
#   91.108.4.0/22
# Facebook Messenger webhooks come from dynamic ranges — don't IP-allowlist FB.
# Zalo OA: no published static range — don't IP-allowlist Zalo.
#
# server {
#     listen 443 ssl http2;
#     server_name webhook-telegram-only.qrf.vn;
#     # ... same TLS block ...
#     location /webhooks/telegram/ {
#         allow 149.154.160.0/20;
#         allow 91.108.4.0/22;
#         deny all;
#         try_files $uri /index.php?$query_string;
#     }
# }