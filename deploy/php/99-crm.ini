; PHP-FPM overrides for the CRM application.
;
; Drop into /etc/php/8.4/fpm/conf.d/99-crm.ini (and the matching CLI ini if
; needed for queue workers) so the FPM pool inherits these without editing
; the distro default php.ini. Laravel reads these at request time.
;
; Why these numbers:
;   upload_max_filesize = 20M
;       Hard cap per single image in the Inbox composer. Laravel's
;       'image.*' => 'max:10240' (KB) rule is the user-facing limit; this
;       is the upstream safety net.
;   post_max_size = 100M
;       Total multipart payload. Must be >= max body nginx accepts
;       (client_max_body_size in crm-main.conf = 100M) — PHP rejects the
;       whole $_FILES / $_POST when post_max_size is hit, which surfaces as
;       a Laravel 422 instead of an nginx 413, so operators get a clearer
;       error than "Request Entity Too Large".
;   max_file_uploads = 20
;       Headroom over the composer cap of 9 images. Anything over 9 is
;       already rejected by Laravel's 'images' => 'max:9' rule.
;   memory_limit = 256M
;       Image processing libraries (Intervention/GD) spike transiently
;       when Laravel re-encodes uploads; 128M is too tight and triggers
;       Allowed memory size errors on a 10 MB JPEG.

upload_max_filesize = 20M
post_max_size       = 100M
max_file_uploads    = 20
memory_limit        = 256M

; Slightly longer max_execution_time so a slow client uploading 9 large
; images doesn't get killed mid-transfer. The queue workers run via CLI
; and aren't affected.
max_execution_time  = 120

; Keep the rest of the distro defaults (timezone, opcache, etc.) — only
; override what the composer / Inbox reply path needs.